<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文鉴 · AI 作文评析引擎</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #f0ece5;
  --surface: #ffffff;
  --surface2:#faf8f5;
  --border:  #e4dfd7;
  --border2: #cec8bf;
  --text:    #1c1814;
  --text2:   #6b6460;
  --text3:   #a09890;
  --c-dispatch:  #4f46e5;
  --c-evaluator: #0d7377;
  --c-structure: #2d7d46;
  --c-language:  #b45309;
  --c-ideas:     #7c3aed;
  --c-aidet:     #be185d;
  --c-coach:     #1d4ed8;
  --c-emotion:   #9d174d;
  --c-allusion:  #92400e;
  --c-errors:    #991b1b;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.05);
  --shadow-lg: 0 4px 12px rgba(0,0,0,.09), 0 16px 48px rgba(0,0,0,.09);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh}
button{font-family:inherit;cursor:pointer}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:200;
  background:rgba(240,236,229,.9);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:54px;
}
.brand{display:flex;align-items:baseline;gap:10px}
.brand-name{font-family:'DM Serif Display','Noto Serif SC',serif;font-size:20px;color:var(--text);letter-spacing:.01em}
.brand-sub{font-size:10px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;font-family:'DM Mono',monospace}
.btn-icon{
  width:34px;height:34px;border:1px solid var(--border);background:var(--surface);
  border-radius:var(--radius);display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:all .15s;
}
.btn-icon:hover{border-color:var(--border2);color:var(--text);box-shadow:var(--shadow)}
.btn-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}

/* ── LAYOUT ── */
.page{max-width:860px;margin:0 auto;padding:0 24px}
.page-wide{max-width:1260px;margin:0 auto;padding:0 28px}

/* ══ INPUT SCREEN ══ */
#inputScreen{padding:64px 0 100px}
.input-hero{text-align:center;margin-bottom:44px}
.input-hero h2{
  font-family:'DM Serif Display','Noto Serif SC',serif;
  font-size:clamp(30px,5.5vw,50px);font-weight:400;
  line-height:1.18;letter-spacing:-.01em;
}
.input-hero h2 em{font-style:italic;color:var(--c-dispatch)}
.input-hero p{margin-top:14px;font-family:'DM Serif Display',serif;font-style:italic;font-size:15px;color:var(--text3)}

.input-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;
}
.input-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);
}
.lang-pill{
  font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 10px;border-radius:99px;border:1px solid var(--border);
  color:var(--text3);transition:all .25s;font-family:'DM Mono',monospace;
}
.lang-pill.zh{border-color:#be185d44;color:#be185d;background:#be185d08}
.lang-pill.en{border-color:#2d7d4644;color:#2d7d46;background:#2d7d4608}
.char-count{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3)}
#essayInput{
  width:100%;min-height:340px;background:none;border:none;outline:none;resize:vertical;
  padding:26px;font-family:'Noto Serif SC',serif;font-size:15px;line-height:2.1;color:var(--text);
  caret-color:var(--c-dispatch);
}
#essayInput::placeholder{color:var(--text3);font-family:'DM Serif Display',serif;font-style:italic;font-size:16px}

.action-row{display:flex;gap:12px;align-items:center;margin-top:24px;justify-content:center;flex-wrap:wrap}
.btn-primary{
  padding:13px 36px;background:var(--text);color:#fff;border:none;border-radius:var(--radius);
  font-size:14px;font-weight:500;letter-spacing:.07em;font-family:'Noto Sans SC',sans-serif;
  transition:all .2s;display:flex;align-items:center;gap:8px;
}
.btn-primary:hover{background:#2c2420;transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.btn-primary:active{transform:none}
.btn-primary:disabled{opacity:.4;pointer-events:none}
.btn-primary svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2}
.btn-ghost{
  padding:13px 20px;background:none;border:1px solid var(--border);border-radius:var(--radius);
  font-size:13px;color:var(--text2);letter-spacing:.04em;transition:all .15s;
}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}

/* Agent preview grid */
.preview-label{
  margin-top:52px;margin-bottom:14px;
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);
  font-family:'DM Mono',monospace;text-align:center;
}
.agents-preview{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:8px;
}
.preview-chip{
  background:var(--surface);border:1px solid var(--border);
  border-left:3px solid;border-radius:var(--radius);
  padding:11px 13px;display:flex;align-items:center;gap:10px;
  font-size:12px;color:var(--text2);transition:box-shadow .15s;
}
.preview-chip:hover{box-shadow:var(--shadow)}
.preview-chip-emoji{font-size:15px;flex-shrink:0}
.preview-chip-name{font-size:12px;font-weight:500;color:var(--text)}
.preview-chip-type{font-size:10px;color:var(--text3);margin-top:1px;font-family:'DM Mono',monospace}

/* ══ DASHBOARD ══ */
#dashboardScreen{display:none;padding:28px 0 80px}

.dash-topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;flex-wrap:wrap;gap:12px;
}
.dash-title{font-family:'DM Serif Display','Noto Serif SC',serif;font-size:20px;font-weight:400;color:var(--text)}
.dash-right{display:flex;gap:20px;align-items:center}
.stat-badge{text-align:center}
.stat-num{font-family:'DM Mono',monospace;font-size:18px;font-weight:500}
.stat-lbl{font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}

.progress-track{height:2px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:28px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--c-dispatch),#a78bfa);border-radius:99px;width:0%;transition:width .5s ease}

/* Dispatcher */
.section-label{
  font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);
  font-family:'DM Mono',monospace;margin-bottom:10px;
  display:flex;align-items:center;gap:10px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

.dispatch-card{
  background:var(--surface);border:1px solid var(--border);
  border-left:4px solid var(--c-dispatch);
  border-radius:var(--radius);box-shadow:var(--shadow);
  overflow:hidden;margin-bottom:24px;
}
.dispatch-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;background:#4f46e508;border-bottom:1px solid var(--border);
}
.dispatch-head-title{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:500;color:var(--c-dispatch);
}
.badge-pill{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;
  padding:2px 8px;border-radius:99px;background:var(--c-dispatch);color:#fff;
}
.dispatch-body{
  padding:14px 18px;font-family:'DM Mono',monospace;font-size:12px;
  line-height:1.85;color:var(--text2);min-height:52px;white-space:pre-wrap;
}

/* Agent panels */
.agents-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));
  gap:14px;margin-bottom:24px;
}
.agent-card{
  background:var(--surface);border:1px solid var(--border);
  border-top:3px solid;border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden;
  display:flex;flex-direction:column;min-height:210px;
  transition:box-shadow .2s;
  --ac:var(--border);
}
.agent-card:hover{box-shadow:var(--shadow-lg)}
.agent-card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--border);
}
.agent-head-left{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;color:var(--ac)}
.agent-head-left .emoji{font-size:15px}
.agent-head-left .en-name{font-size:10px;font-family:'DM Mono',monospace;opacity:.5;margin-left:2px}
.agent-status{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all .3s;flex-shrink:0}
.sdot.running{background:var(--ac);animation:sdot-pulse 1s ease-in-out infinite}
.sdot.done{background:#22c55e;animation:none}
.sdot.error{background:#ef4444;animation:none}
@keyframes sdot-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.75)}}

.agent-body{
  flex:1;padding:14px 16px;font-size:13px;line-height:1.88;color:var(--text2);
  overflow-y:auto;max-height:280px;white-space:pre-wrap;word-break:break-word;
}
.agent-body::-webkit-scrollbar{width:3px}
.agent-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

.agent-foot{
  padding:7px 14px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface2);
}
.token-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)}

.waiting-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:8px;padding:20px;opacity:.35;
}
.waiting-dots{display:flex;gap:5px}
.waiting-dots span{
  width:5px;height:5px;border-radius:50%;background:var(--text3);
  animation:wdot 1.4s ease-in-out infinite;
}
.waiting-dots span:nth-child(2){animation-delay:.2s}
.waiting-dots span:nth-child(3){animation-delay:.4s}
@keyframes wdot{0%,80%,100%{transform:scale(.55);opacity:.35}40%{transform:scale(1);opacity:1}}

/* Cursor */
.typing::after{content:'▋';animation:blink .7s step-end infinite;color:var(--ac);font-size:.85em}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ══ MODAL ══ */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.38);
  backdrop-filter:blur(6px);z-index:500;
  display:none;align-items:center;justify-content:center;
}
.overlay.open{display:flex;animation:mo .2s ease}
@keyframes mo{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;width:100%;max-width:456px;margin:20px;
  box-shadow:var(--shadow-lg);overflow:hidden;
}
.modal-head{
  padding:20px 24px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-head h3{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400}
.modal-x{
  width:28px;height:28px;border:1px solid var(--border);background:none;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:all .15s;
}
.modal-x:hover{border-color:var(--border2);color:var(--text)}
.modal-x svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.modal-body{padding:20px 24px 24px;display:flex;flex-direction:column;gap:16px}
.field label{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;font-family:'DM Mono',monospace}
.field input,.field select{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 12px;font-size:13px;color:var(--text);
  font-family:'DM Mono',monospace;outline:none;transition:border-color .15s;appearance:none;
}
.field input:focus,.field select:focus{border-color:var(--c-dispatch)}
.field input::placeholder{color:var(--text3)}
.field .hint{margin-top:5px;font-size:11px;color:var(--text3);line-height:1.5}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.key-wrap{position:relative}
.key-wrap input{padding-right:36px}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3)}
.eye-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.status-bar{
  display:flex;align-items:center;gap:8px;padding:9px 12px;
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  font-size:12px;color:var(--text2);
}
.sindic{width:7px;height:7px;border-radius:50%;background:var(--border2);flex-shrink:0}
.sindic.ok{background:#22c55e;box-shadow:0 0 6px #22c55e66}
.btn-save{
  width:100%;padding:11px;background:var(--text);color:#fff;border:none;
  border-radius:var(--radius);font-size:13px;font-weight:500;letter-spacing:.06em;transition:all .2s;
}
.btn-save:hover{background:#2c2420;box-shadow:var(--shadow-lg)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--text);color:#fff;padding:9px 20px;border-radius:var(--radius);
  font-size:13px;z-index:9999;transition:transform .3s ease;white-space:nowrap;box-shadow:var(--shadow-lg);
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.warn{background:#c0392b}

@media(max-width:640px){
  .agents-grid{grid-template-columns:1fr}
  .agents-preview{grid-template-columns:1fr 1fr}
  .frow{grid-template-columns:1fr}
  .topbar{padding:0 16px}
  .page,.page-wide{padding:0 16px}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <span class="brand-name">文鉴</span>
    <span class="brand-sub">AI Essay Engine</span>
  </div>
  <button class="btn-icon" id="settingsBtn">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
  </button>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-head">
      <h3>API 配置</h3>
      <button class="modal-x" id="modalClose"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>DeepSeek API Key</label>
        <div class="key-wrap">
          <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx">
          <button class="eye-btn" id="eyeBtn"><svg id="eyeSvg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg></button>
        </div>
        <p class="hint">仅存储于本地浏览器 · <a href="https://platform.deepseek.com" target="_blank" style="color:var(--c-dispatch)">platform.deepseek.com</a></p>
      </div>
      <div class="frow">
        <div class="field">
          <label>模型</label>
          <select id="modelSel">
            <option value="deepseek-reasoner">DeepSeek R2 (推理)</option>
            <option value="deepseek-chat" selected>DeepSeek V3 (快速)</option>
          </select>
        </div>
        <div class="field">
          <label>并发模式</label>
          <select id="concurrencySel">
            <option value="full">全速并发</option>
            <option value="staggered">错峰启动</option>
          </select>
        </div>
      </div>
      <div class="status-bar">
        <div class="sindic" id="sindic"></div>
        <span id="statusMsg">尚未配置</span>
      </div>
      <button class="btn-save" id="saveBtn">保存</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ════ INPUT SCREEN ════ -->
<div id="inputScreen">
  <div class="page">
    <div class="input-hero">
      <h2>投入一篇作文，<em>十位专家</em><br>为你同时开始工作。</h2>
      <p>10 Agents · Concurrent Streaming · Chinese &amp; English</p>
    </div>

    <div class="input-card">
      <div class="input-toolbar">
        <div class="lang-pill" id="langPill">自动检测语言</div>
        <div class="char-count" id="charCount">0 字符</div>
      </div>
      <textarea id="essayInput" placeholder="将你的中文或英文作文粘贴于此……&#10;&#10;Paste your essay here — any genre, any language."></textarea>
    </div>

    <div class="action-row">
      <button class="btn-primary" id="analyzeBtn">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/></svg>
        启动十 Agent 评析引擎
      </button>
      <button class="btn-ghost" id="clearBtn">清空</button>
    </div>

    <p class="preview-label">Agent 集群阵容</p>
    <div class="agents-preview" id="agentPreview"></div>
  </div>
</div>

<!-- ════ DASHBOARD SCREEN ════ -->
<div id="dashboardScreen">
  <div class="page-wide">
    <div class="dash-topbar">
      <div class="dash-title" id="dashTitle">初始化 Agent 引擎…</div>
      <div class="dash-right">
        <div class="stat-badge"><div class="stat-num" id="statDone">0</div><div class="stat-lbl">完成</div></div>
        <div class="stat-badge"><div class="stat-num" id="statRunning">0</div><div class="stat-lbl">运行中</div></div>
        <div class="stat-badge"><div class="stat-num" id="statTotal">0</div><div class="stat-lbl">总计</div></div>
        <button class="btn-ghost" id="backBtn" style="font-size:12px;padding:8px 14px">← 返回</button>
      </div>
    </div>

    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

    <!-- Dispatcher -->
    <div class="section-label">调度总指挥</div>
    <div class="dispatch-card" id="dispatchCard">
      <div class="dispatch-head">
        <div class="dispatch-head-title">
          <span style="font-size:15px">🔀</span>
          调度总指挥 · Dispatcher
          <span style="font-size:10px;font-family:'DM Mono',monospace;opacity:.5;margin-left:4px">AGENT #0</span>
        </div>
        <span class="badge-pill" style="background:var(--c-dispatch)">PRIMARY · CORE</span>
      </div>
      <div class="dispatch-body" id="dispatchBody"><span style="color:var(--text3)">等待启动…</span></div>
    </div>

    <!-- Core agents -->

/* ═══ DETECT LANG ═══ */
function detectLang(t) {
  const cn=(t.match(/[\u4e00-\u9fff]/g)||[]).length;
  return cn/Math.max(1,t.replace(/\s/g,'').length)>.15?'zh':'en';
}

/* ═══ API CALL (SSE STREAMING) ═══ */
async function streamCall({sys, usr, maxTokens=700, onChunk, onDone, onError}) {
  const body = {
    model: cfg.model,
    max_tokens: maxTokens,
    stream: true,
    messages:[{role:'system',content:sys},{role:'user',content:usr}],
  };

  let res;
  try {
    res = await fetch('https://api.deepseek.com/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.apiKey},
      body:JSON.stringify(body),
    });
  } catch(e){ onError('网络错误: '+e.message); return; }

  if(!res.ok){
    let m='HTTP '+res.status;
    try{const j=await res.json();m=j.error?.message||m;}catch{}
    onError(m); return;
  }

  const reader=res.body.getReader();
  const dec=new TextDecoder();
  let buf='';
  try {
    while(true){
      const{done,value}=await reader.read();
      if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data:')) continue;
        const raw=line.slice(5).trim();
        if(raw==='[DONE]'){onDone();return;}
        try{
          const p=JSON.parse(raw);
          const delta=p.choices?.[0]?.delta;
          if(!delta) continue;
          if(Array.isArray(delta.content)){
            for(const blk of delta.content)
              if(blk.type==='text'&&blk.text) onChunk(blk.text);
          } else if(typeof delta.content==='string'&&delta.content){
            onChunk(delta.content);
          }
        }catch{}
      }
    }
  } catch(e){ onError('读取错误: '+e.message); return; }
  onDone();
}

/* ═══ BUILD CARD ═══ */
function buildCard(agent) {
  const el=document.createElement('div');
  el.className='agent-card';
  el.id='card-'+agent.id;
  el.style.setProperty('--ac', agent.color);
  el.style.borderTopColor=agent.color;
  el.innerHTML=`
<div class="agent-card-head">
  <div class="agent-head-left">
    <span class="emoji">${agent.emoji}</span>
    ${agent.name}
    <span class="en-name">/ ${agent.en}</span>
  </div>
  <div class="agent-status">
    <div class="sdot" id="sdot-${agent.id}"></div>
    <span id="sstat-${agent.id}">待机</span>
  </div>
</div>
<div class="agent-body" id="body-${agent.id}">
  <div class="waiting-state">
    <div class="waiting-dots"><span></span><span></span><span></span></div>
    <span style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">等待调度…</span>
  </div>
</div>
<div class="agent-foot">
  <span class="token-count" id="tok-${agent.id}" data-chars="0">0 tokens</span>
  <span style="font-size:10px;font-family:'DM Mono',monospace;color:var(--border2)">${agent.badge}</span>
</div>`;
  return el;
}

function setStatus(id, state, label) {
  const d=document.getElementById('sdot-'+id);
  const s=document.getElementById('sstat-'+id);
  if(!d) return;
  d.className='sdot '+state;
  const map={waiting:'待机',running:'运行中',done:'✓ 完成',error:'✗ 错误'};
  if(s) s.textContent=label||(map[state]||state);
}

function appendChunk(id, chunk) {
  const body=document.getElementById('body-'+id);
  if(!body) return;
  const w=body.querySelector('.waiting-state');
  if(w){ w.remove(); body.classList.add('typing'); }
  body.textContent+=chunk;
  const tok=document.getElementById('tok-'+id);
  if(tok){
    const n=parseInt(tok.dataset.chars||'0')+chunk.length;
    tok.dataset.chars=n;
    tok.textContent='~'+Math.round(n/4)+' tokens';
  }
  body.scrollTop=body.scrollHeight;
}

function finishCard(id){
  const b=document.getElementById('body-'+id);
  if(b) b.classList.remove('typing');
  setStatus(id,'done');
  doneAgents++; runningAgents=Math.max(0,runningAgents-1);
  updateStats();
}

function errorCard(id,msg){
  const b=document.getElementById('body-'+id);
  if(b){ b.classList.remove('typing'); b.textContent+=(b.textContent?'\n\n':'')+'[错误] '+msg; }
  setStatus(id,'error');
  doneAgents++; runningAgents=Math.max(0,runningAgents-1);
  updateStats();
}

function startCard(id){
  setStatus(id,'running');
  runningAgents++;
  updateStats();
}

function updateStats(){
  const pct=totalAgents>0?(doneAgents/totalAgents)*100:0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('statDone').textContent=doneAgents;
  document.getElementById('statRunning').textContent=runningAgents;
  if(doneAgents>=totalAgents&&totalAgents>0){
    document.getElementById('dashTitle').textContent='✓ 评析完成 · 共 '+totalAgents+' 个 Agent';
  }
}

/* ═══ RUN ONE AGENT ═══ */
function runAgent(agent, essay, lang, meta){
  startCard(agent.id);
  const p=agent.getPrompt(essay,lang,meta);
  streamCall({
    sys:p.sys, usr:p.usr||essay,
    maxTokens:agent.maxTokens||700,
    onChunk(c){ appendChunk(agent.id,c); },
    onDone(){ finishCard(agent.id); },
    onError(e){ errorCard(agent.id,e); }
  });
}

/* ═══ DISPATCHER ═══ */
async function runDispatcher(essay, lang){
  return new Promise(resolve=>{
    const body=document.getElementById('dispatchBody');
    body.innerHTML='<span style="color:var(--text3);font-family:\'DM Mono\',monospace;font-size:12px">分析中</span><span style="animation:blink .7s step-end infinite;color:var(--c-dispatch)"> ▋</span>';

    const sys=`你是AI作文评析系统的调度总指挥。请快速分析这篇${lang==='zh'?'中文':'英文'}作文，用80字以内（中文）输出调度摘要：
1) 文体类型
2) 整体水平一句话印象
3) 最值得关注的一点

最后一行必须输出（不要解释）：
META:{"type":"文体名","isNarrative":true或false,"isZh":${lang==='zh'},"level":"elementary或middle或high或college"}`;

    let full=''; let meta=null;
    streamCall({
      sys, usr:essay, maxTokens:280,
      onChunk(c){
        full+=c;
        const disp=full.replace(/\nMETA:\{[^}]*\}\s*$/,'');
        body.innerHTML='<span style="font-family:\'DM Mono\',monospace;font-size:12px;color:var(--text2);white-space:pre-wrap">'+escHtml(disp)+'</span><span style="animation:blink .7s step-end infinite;color:var(--c-dispatch)"> ▋</span>';
      },
      onDone(){
        const m=full.match(/META:(\{[^}]+\})/);
        if(m){ try{meta=JSON.parse(m[1]);}catch{} }
        const disp=full.replace(/\nMETA:\{[^}]*\}\s*$/,'').trim();
        body.innerHTML='<span style="font-family:\'DM Mono\',monospace;font-size:12px;color:var(--text2);white-space:pre-wrap">'+escHtml(disp)+'</span>';
        doneAgents++; runningAgents=Math.max(0,runningAgents-1);
        updateStats();
        resolve(meta||{type:'议论文',isNarrative:false,isZh:lang==='zh',level:'high'});
      },
      onError(e){
        body.innerHTML='<span style="color:#ef4444;font-size:12px">[错误] '+escHtml(e)+'</span>';
        doneAgents++; runningAgents=Math.max(0,runningAgents-1);
        updateStats();
        resolve({type:'议论文',isNarrative:false,isZh:lang==='zh',level:'high'});
      }
    });
    runningAgents++; updateStats();
  });
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ═══ MAIN START ═══ */
async function startAnalysis(){
  const essay=document.getElementById('essayInput').value.trim();
  if(!essay){ showToast('请先输入作文内容',true); return; }
  if(!cfg.apiKey){ showToast('请先配置 API Key',true); openSettings(); return; }

  const lang=detectLang(essay);
  doneAgents=0; runningAgents=0; totalAgents=0;

  // Switch to dashboard
  document.getElementById('inputScreen').style.display='none';
  const dash=document.getElementById('dashboardScreen');
  dash.style.display='block';
  window.scrollTo({top:0});

  // Build core panels
  document.getElementById('coreGrid').innerHTML='';
  CORE_AGENTS.forEach(a=>document.getElementById('coreGrid').appendChild(buildCard(a)));

  // Total: dispatcher(1) + 5 core + conditionals TBD
  totalAgents=1+CORE_AGENTS.length;
  document.getElementById('statTotal').textContent='?';
  document.getElementById('dashTitle').textContent='调度总指挥分析中…';

  // Run dispatcher
  const meta=await runDispatcher(essay,lang);

  // Determine active conditional agents
  const active=CONDITIONAL_AGENTS.filter(a=>a.condition(meta));

  if(active.length>0){
    document.getElementById('conditionalSection').style.display='block';
    const cg=document.getElementById('conditionalGrid');
    cg.innerHTML='';
    active.forEach(a=>cg.appendChild(buildCard(a)));
  }

  totalAgents=1+CORE_AGENTS.length+active.length;
  document.getElementById('statTotal').textContent=totalAgents;
  document.getElementById('dashTitle').textContent='并发运行 '+totalAgents+' 个 Agent…';

  const stagger=cfg.concurrency==='staggered'?150:40;

  // Fire core agents
  CORE_AGENTS.forEach((a,i)=>{
    setTimeout(()=>runAgent(a,essay,lang,meta), i*stagger);
  });

  // Fire conditional agents
  active.forEach((a,i)=>{
    setTimeout(()=>runAgent(a,essay,lang,meta), CORE_AGENTS.length*stagger+200+i*(stagger+60));
  });
}
